[SCP-178]
image path = 178.jpg
align x = left
align y = top
text1 = SCP-178 is a pair of white stereoscopic ("3-D") glasses with a rectangular white cardboard frame and lenses of transparent blue and red (left and right lenses, respectively) plastic. The item exhibits no unusual physical properties apart from a slight discoloration of the cardboard consistent with age.
text2 = When worn, the wearer begins perceiving large bipedal entities in addition to its ordinary surroundings. Entities reportedly exhibit a docile and occasionally curious behavior, with one exception.
text3 = Any attempt by the wearer or any other personnel to directly interact with the entities results in severe lacerations suddenly appearing on persons involved.
[SCP-409]
image path = 409.png
align x = center
align y = bottom
text1 = SCP-409 resembles a large quartz crystal approximately 1.5m (5ft) tall and 0.6m (2ft) wide.
text2 = Any objects coming in contact with SCP-409 will begin to crystallize.
text3 = After complete crystallization, the object will begin to make snapping and creaking noises for approximately twenty minutes, before bursting into thousands of fragments with great force.
[SCP-650]
image path = 650.png
align x = center
align y = center
disablebackground = true
text1=Black statue of a stylized humanoid 167cm tall. The statue does not possess hands or facial features: the limbs taper off into rounded points and the head is a smooth surface all around. The default posture while under observation has the statue reaching upwards, head tilted as if facing the sky. If the statue is not being observed, it will relocate itself to a point immediately behind whomever is in the containment site and assume a threatening posture.

[SCP-1074]
image path = 1074.jpg
align x = left
align y = bottom
disablebackground = true
text1 =  SCP-1074 is a portrait-sized oil painting on canvas, produced by an unidentified artist. When photographed or videotaped, the entirety of SCP-1074 appears to be painted a uniform shade of gray, with distinctly visible brush strokes.
text2 = When SCP-1074 is viewed by a human being, the observer immediately begins to exhibit physiological symptoms similar to the onset of Stendhal syndrome, including increased heart rate, sweating, and vertigo.
text3 = The individual viewing SCP-1074 will attempt to vividly describe the image they are seeing to anyone present, frequently describing it as the greatest or most moving work of art they have ever seen.
[SCP-239]
image path = 239.jpg
align x = right
align y = top
disablebackground = true
text1 = SCP-239 appears to be an 8-year-old girl, 1 meter in height and 20 kilograms in weight. Subject has shoulder-length blond hair. Upon closer inspection, the subject's eyes "shimmer" a gray-green shade. The subject seems to emit a previously undiscovered form of radiation, where these "waves" seem to be harmless in low concentrations but in higher concentrations, they could break down matter on a subatomic level. 
text2 = SCP-239 seemingly has the ability to do whatever she expresses a will to do. Put simply, the subject can do anything that she truly wants to do on a basal psychological level as long as she is conscious. Fortunately, she only seems to be able to affect herself and her immediate surroundings; therefore, "If she can see it, she can change it." It would not be the most prudent course of action, however, to try to test how powerful she can be. 
text3 = She seems to be able to create and affect living matter; for example, when a D-class personnel accidentally caused her harm, she simply wished him away. Fortunately, when the subject was made to feel guilty for what she had done, she wished him back. SCP-239's self-preservation instinct makes her virtually invincible while she is conscious. Subject's skin cannot be punctured by anything except SCP-148. 
text4 = As a method of controlling the subject's ability, she has been told that she is a witch. This, besides improving morale greatly, makes her believe that she is unable to use her abilities outside of a pre-approved list of "spells" given to her by the SCP Foundation. This will hopefully prevent any and all attempted escapes. However, the subject is to be kept calm at all times to prevent any subconscious wish of harm to herself or others. 
[SCP-689]
image path = 689.jpg
align x = left
align y = bottom
disablebackground = true
text1 = SCP-689 appears to be a small green soapstone statue, 30 cm in height. It is carved in the semblance of what appears to be an unknown deity of the underworld, a seated skeletal figure with hands clasped over knees. 
text2 = SCP-689 is completely inert for as long as it is being watched by at least one human being. Normal behaviors such as blinking do not appear to interrupt the "watching" for this purpose, but any lapse in attention, however momentary, renders the observer vulnerable.
text3 = As soon as SCP-689 is unobserved it vanishes from its current location. Within 15-20 seconds one person who has previously viewed SCP-689 dies instantaneously, SCP-689 reappearing on top of their remains. If no previous viewers are presently alive, it reappears in the same place as previous. 
[SCP-2053]
image path = 2053.jpg
align x = center
align y = bottom
disablebackground = true
text1 = SCP-2053-1, also known as "Paternal Rubik's Cube", is a sentient Safe-class object under the complete custody of the SCP Foundation. The object was previously a human father who transformed himself into a Rubik's Cube in order to finally communicate with his disabled son. 
text2 = It is unknown how the father looked like prior to being transformed into a puzzle cube. After his transformation he resembled a normal Rubik's Cube with colored stickers measuring approximately 5.7cm along each exterior edge, and shows signs of wear and tear most likely due to use, but the stickers have never been removed. 
text3 = SCP-2053-1 has the ability to rotate parts of his "body" in order to communicate with other people. SCP-2053-2 also contains exactly 43252003274489856000 pages filled with every combination each corresponding with a English sentence, and far surpasses the number that should be possible of a file of a size of 1.21 MB. 
